name: Code Quality

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  GODOT_VERSION: "4.6"
  GODOT_RELEASE: "4.6-stable"

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gdtoolkit
        run: pip install gdtoolkit

      - name: Check GDScript formatting
        run: |
          echo "Checking GDScript formatting..."
          gdformat --check scripts/ || (echo "❌ Code is not formatted. Run 'gdformat scripts/' to fix." && exit 1)
          echo "✅ All GDScript files are properly formatted"

      - name: Run GDScript linter
        run: |
          echo "Running GDScript linter..."
          gdlint scripts/ || (echo "⚠️ Linter warnings found. Please review and fix." && exit 0)
          echo "✅ No linter errors found"

      - name: Check JSON files
        run: |
          echo "Checking JSON files..."
          find data/ -name "*.json" -exec python -m json.tool {} \; > /dev/null || (echo "❌ Invalid JSON found" && exit 1)
          echo "✅ All JSON files are valid"

  type-check:
    name: Type Check (Godot 4.6)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_RELEASE }}/Godot_v${{ env.GODOT_RELEASE }}_linux.x86_64.zip
          unzip -q Godot_v${{ env.GODOT_RELEASE }}_linux.x86_64.zip
          sudo mv Godot_v${{ env.GODOT_RELEASE }}_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Import project and check scripts
        run: |
          # 먼저 GUT 포함해서 임포트 → class_names 등록
          timeout 180 godot --headless --import 2>&1 || true
          # addons/는 서드파티 코드이므로 type-check에서 제외 (import 후에 적용)
          touch addons/gut/.gdignore
          timeout 180 godot --headless --check-only --script-check 2>&1
          echo "✅ Script validation complete"

  # test job 제거됨 - GitHub Actions 시간 절약 목적
  # 로컬에서 실행: godot --headless -s addons/gut/gut_cmdln.gd
