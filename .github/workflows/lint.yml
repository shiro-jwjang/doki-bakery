name: Code Quality

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install gdtoolkit
        run: |
          pip install gdtoolkit
          
      - name: Check GDScript formatting
        run: |
          echo "Checking GDScript formatting..."
          gdformat --check scripts/ || (echo "❌ Code is not formatted. Run 'gdformat scripts/' to fix." && exit 1)
          echo "✅ All GDScript files are properly formatted"
          
      - name: Run GDScript linter
        run: |
          echo "Running GDScript linter..."
          gdlint scripts/ || (echo "⚠️ Linter warnings found. Please review and fix." && exit 0)
          echo "✅ No linter errors found"
          
      - name: Check JSON files
        run: |
          echo "Checking JSON files..."
          find data/ -name "*.json" -exec python -m json.tool {} \; > /dev/null || (echo "❌ Invalid JSON found" && exit 1)
          echo "✅ All JSON files are valid"

  type-check:
    name: Type Check (Godot)
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.2.2
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Import project and check scripts
        run: |
          godot --headless --import
          godot --headless --check-only --script-check
          echo "✅ Script validation complete"
