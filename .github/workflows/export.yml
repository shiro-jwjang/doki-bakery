name: Godot Export

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

env:
  GODOT_VERSION: "4.3"
  GODOT_RELEASE: "4.3-stable"

jobs:
  export:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [windows, linux, mac]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_RELEASE }}/Godot_v${{ env.GODOT_RELEASE }}_linux.x86_64.zip
          unzip -q Godot_v${{ env.GODOT_RELEASE }}_linux.x86_64.zip
          sudo mv Godot_v${{ env.GODOT_RELEASE }}_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_RELEASE }}
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_RELEASE }}/Godot_v${{ env.GODOT_RELEASE }}_export_templates.tpz
          unzip -q Godot_v${{ env.GODOT_RELEASE }}_export_templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_RELEASE }}/

      - name: Import assets
        run: timeout 300 godot --headless --import 2>&1 || true

      - name: Export (Windows)
        if: matrix.target == 'windows'
        run: |
          mkdir -p builds/windows
          godot --headless --export-release "Windows Desktop" builds/windows/doki-bakery.exe

      - name: Export (Linux)
        if: matrix.target == 'linux'
        run: |
          mkdir -p builds/linux
          godot --headless --export-release "Linux/X11" builds/linux/doki-bakery

      - name: Export (macOS)
        if: matrix.target == 'mac'
        run: |
          mkdir -p builds/mac
          godot --headless --export-release "macOS" builds/mac/doki-bakery.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: doki-bakery-${{ matrix.target }}
          path: builds/${{ matrix.target }}
          retention-days: 30
