name: Godot Export

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

env:
  GODOT_VERSION: 4.2.2

jobs:
  export:
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.2.2
    strategy:
      matrix:
        target: [windows, linux, mac]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import assets
        run: godot --headless --import

      - name: Export (Windows)
        if: matrix.target == 'windows'
        run: |
          mkdir -p builds/windows
          godot --headless --export-release "Windows Desktop" builds/windows/doki-bakery.exe

      - name: Export (Linux)
        if: matrix.target == 'linux'
        run: |
          mkdir -p builds/linux
          godot --headless --export-release "Linux/X11" builds/linux/doki-bakery

      - name: Export (macOS)
        if: matrix.target == 'mac'
        run: |
          mkdir -p builds/mac
          godot --headless --export-release "macOS" builds/mac/doki-bakery.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: doki-bakery-${{ matrix.target }}
          path: builds/${{ matrix.target }}
          retention-days: 30
